<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type — Body & amounts" subtitle="Body, label, eyebrow, money sizes" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 28px 32px; }
  .row {
    display: grid; grid-template-columns: auto 1fr;
    gap: 24px; align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-hairline);
  }
  .row:last-child { border-bottom: 0; }
  .meta {
    font-family: var(--font-body); font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg-2); min-width: 130px;
  }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Body</div>
    <div class="t-body">Set aside money for what matters, without breaking your month.</div>
  </div>
  <div class="row">
    <div class="meta">Body sm</div>
    <div class="t-body-sm">Tuesday · 14 March · 2:42 PM</div>
  </div>
  <div class="row">
    <div class="meta">Label</div>
    <div class="t-label">Active currency</div>
  </div>
  <div class="row">
    <div class="meta">Eyebrow</div>
    <div class="t-eyebrow">Available · USD</div>
  </div>
  <div class="row">
    <div class="meta">Amount lg / md / sm</div>
    <div style="display:flex; gap:24px; align-items: baseline;">
      <span class="t-amount-lg">$ 1,250.00</span>
      <span class="t-amount-md">$ 420.50</span>
      <span class="t-amount-sm">−$ 12.40</span>
    </div>
  </div>
</body>
</html>
