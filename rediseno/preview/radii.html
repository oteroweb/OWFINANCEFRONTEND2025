<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="8 / 12 / 16 / 20 (card) / 28 (hero)" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 80px; height: 56px; background: #fff; box-shadow: var(--shadow-card); }
  .meta { font-family: var(--font-body); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-2); text-align: center; }
  .px { font-family: var(--font-body); font-variant-numeric: tabular-nums; font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius: var(--radius-xs);"></div><div class="meta">radius-xs</div><div class="px">8 px</div></div>
    <div class="tile"><div class="box" style="border-radius: var(--radius-sm);"></div><div class="meta">radius-sm</div><div class="px">12 px</div></div>
    <div class="tile"><div class="box" style="border-radius: var(--radius-md);"></div><div class="meta">radius-md</div><div class="px">16 px</div></div>
    <div class="tile"><div class="box" style="border-radius: var(--radius-lg);"></div><div class="meta">radius-lg · card</div><div class="px">20 px</div></div>
    <div class="tile"><div class="box" style="border-radius: var(--radius-xl);"></div><div class="meta">radius-xl · hero</div><div class="px">28 px</div></div>
  </div>
</body>
</html>
