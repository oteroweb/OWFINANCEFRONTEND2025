<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation / shadow" subtitle="card · hover · float · popover" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 32px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .tile { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box {
    width: 110px; height: 70px; background: var(--surface-1);
    border-radius: var(--radius-lg);
  }
  .meta { font-family: var(--font-body); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-2); }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--fg-1); font-variant-numeric: tabular-nums; max-width: 140px; text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-card);"></div>
      <div class="meta">shadow-card</div>
      <div class="note">cards, default rest state</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-hover);"></div>
      <div class="meta">shadow-hover</div>
      <div class="note">card hover lift</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-float);"></div>
      <div class="meta">shadow-float</div>
      <div class="note">floating nav, hero card</div>
    </div>
    <div class="tile">
      <div class="box" style="box-shadow: var(--shadow-popover);"></div>
      <div class="meta">shadow-popover</div>
      <div class="note">expanded contextual menu</div>
    </div>
  </div>
</body>
</html>
