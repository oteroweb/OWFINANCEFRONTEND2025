<!DOCTYPE html>
<!-- @dsCard group="Components" name="Jars preview row" subtitle="Three jars with goals + status" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .jar {
    background: var(--surface-1); border-radius: var(--radius-lg);
    padding: 18px; box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; gap: 10px;
  }
  .head { display: flex; align-items: center; gap: 10px; }
  .icon {
    width: 32px; height: 32px; border-radius: var(--radius-pill);
    display: flex; align-items: center; justify-content: center;
    background: var(--brand-primary-soft); color: var(--brand-primary-fg-soft);
  }
  .icon.warn { background: var(--warning-soft); color: var(--warning-fg); }
  .icon.income { background: var(--income-soft); color: var(--income-fg); }
  .icon .material-icons { font-size: 18px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--fg-1); }
  .amt { font-family: var(--font-money); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 20px; color: var(--fg-1); }
  .meta { display: flex; justify-content: space-between; font-family: var(--font-body); font-size: 11px; color: var(--fg-2); }
  .bar { height: 4px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
  .fill { height: 100%; background: var(--brand-primary); border-radius: 999px; }
  .fill.warn { background: var(--warning); }
  .fill.income { background: var(--income); }
</style>
</head>
<body>
  <div class="grid">
    <div class="jar">
      <div class="head"><div class="icon"><span class="material-icons">savings</span></div><div class="name">Emergency fund</div></div>
      <div class="amt">$ 4,200.00</div>
      <div class="bar"><div class="fill" style="width:62%"></div></div>
      <div class="meta"><span>62% of $ 6,800</span><span>Mar 31</span></div>
    </div>
    <div class="jar">
      <div class="head"><div class="icon income"><span class="material-icons">savings</span></div><div class="name">Vacation</div></div>
      <div class="amt">$ 1,820.00</div>
      <div class="bar"><div class="fill income" style="width:91%"></div></div>
      <div class="meta"><span>91% of $ 2,000</span><span>On track</span></div>
    </div>
    <div class="jar">
      <div class="head"><div class="icon warn"><span class="material-icons">savings</span></div><div class="name">Idle cash</div></div>
      <div class="amt">$ 540.20</div>
      <div class="bar"><div class="fill warn" style="width:24%"></div></div>
      <div class="meta"><span>Suggest moving</span><span>Idle 30 d</span></div>
    </div>
  </div>
</body>
</html>
