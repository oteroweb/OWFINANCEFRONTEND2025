<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, secondary, ghost, icon" viewport="700x140" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    border: 0; border-radius: var(--radius-pill); cursor: pointer;
    padding: 12px 22px;
    transition: background var(--dur-base) var(--ease-out), transform 80ms;
  }
  .btn .material-icons { font-size: 18px; }
  .btn-primary { background: var(--brand-primary); color: var(--fg-on-brand); }
  .btn-primary:hover { background: var(--brand-primary-hover); }
  .btn-secondary { background: var(--surface-1); color: var(--fg-1); box-shadow: var(--shadow-card); }
  .btn-secondary:hover { background: var(--surface-2); }
  .btn-ghost { background: transparent; color: var(--fg-1); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-icon {
    padding: 0; width: 44px; height: 44px; justify-content: center;
    background: var(--surface-1); color: var(--fg-1); box-shadow: var(--shadow-card);
  }
  .btn-icon:hover { background: var(--surface-2); }
</style>
</head>
<body>
  <button class="btn btn-primary"><span class="material-icons">add</span>Quick add</button>
  <button class="btn btn-secondary">View all</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-icon" aria-label="notifications"><span class="material-icons">notifications</span></button>
  <button class="btn btn-icon" aria-label="hide balance"><span class="material-icons">visibility</span></button>
</body>
</html>
