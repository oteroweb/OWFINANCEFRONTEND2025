<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type — Display" subtitle="Hero amount, H1–H3" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 28px 32px; }
  .row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-hairline);
  }
  .row:last-child { border-bottom: 0; }
  .meta {
    font-family: var(--font-body); font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg-2); min-width: 130px;
  }
  .specimen { color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Display / Hero</div>
    <div class="specimen t-hero-amount">$ 12,480.50</div>
  </div>
  <div class="row">
    <div class="meta">Display / H1</div>
    <div class="specimen t-h1">Your money, calm.</div>
  </div>
  <div class="row">
    <div class="meta">Display / H2</div>
    <div class="specimen t-h2">Recent transactions</div>
  </div>
  <div class="row">
    <div class="meta">Display / H3</div>
    <div class="specimen t-h3">March goal</div>
  </div>
</body>
</html>
