<!DOCTYPE html>
<!-- @dsCard group="Components" name="Recent transactions list" subtitle="Income / expense rows" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 20px; }
  .list { background: var(--surface-1); border-radius: var(--radius-lg); padding: 6px 0; box-shadow: var(--shadow-card); }
  .row {
    display: grid; grid-template-columns: auto 1fr auto; gap: 14px;
    align-items: center; padding: 12px 20px;
  }
  .row + .row { border-top: 1px solid var(--border-hairline); }
  .icon {
    width: 38px; height: 38px; border-radius: var(--radius-pill);
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); color: var(--fg-1);
  }
  .icon.income  { background: var(--income-soft); color: var(--income-fg); }
  .icon.expense { background: var(--expense-soft); color: var(--expense-fg); }
  .icon .material-icons { font-size: 20px; }
  .label { font-family: var(--font-body); font-weight: 500; font-size: 14px; color: var(--fg-1); }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--fg-2); }
  .amt { font-family: var(--font-money); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 15px; }
  .amt.income { color: var(--income-fg); }
  .amt.expense { color: var(--expense-fg); }
</style>
</head>
<body>
  <div class="list">
    <div class="row">
      <div class="icon income"><span class="material-icons">arrow_downward</span></div>
      <div><div class="label">Salary · ACH transfer</div><div class="meta">Tue 14 Mar · 9:02 AM</div></div>
      <div class="amt income">+ $ 3,200.00</div>
    </div>
    <div class="row">
      <div class="icon expense"><span class="material-icons">arrow_outward</span></div>
      <div><div class="label">Whole Foods Market</div><div class="meta">Tue 14 Mar · 2:42 PM</div></div>
      <div class="amt expense">− $ 84.12</div>
    </div>
    <div class="row">
      <div class="icon expense"><span class="material-icons">arrow_outward</span></div>
      <div><div class="label">Spotify Family</div><div class="meta">Mon 13 Mar</div></div>
      <div class="amt expense">− $ 16.99</div>
    </div>
  </div>
</body>
</html>
