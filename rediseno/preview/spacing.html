<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="8px base grid, space-1 → space-10" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end; }
  .tile { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { background: var(--navy-700); border-radius: var(--radius-xs); }
  .meta { font-family: var(--font-body); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-2); text-align: center; }
  .px { font-family: var(--font-body); font-variant-numeric: tabular-nums; font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="box" style="width:4px; height:4px;"></div><div class="meta">space-1</div><div class="px">4 px</div></div>
    <div class="tile"><div class="box" style="width:8px; height:8px;"></div><div class="meta">space-2</div><div class="px">8 px</div></div>
    <div class="tile"><div class="box" style="width:16px; height:16px;"></div><div class="meta">space-4</div><div class="px">16 px</div></div>
    <div class="tile"><div class="box" style="width:24px; height:24px;"></div><div class="meta">space-6</div><div class="px">24 px</div></div>
    <div class="tile"><div class="box" style="width:40px; height:40px;"></div><div class="meta">space-8</div><div class="px">40 px</div></div>
    <div class="tile"><div class="box" style="width:64px; height:64px;"></div><div class="meta">space-10</div><div class="px">64 px</div></div>
  </div>
</body>
</html>
