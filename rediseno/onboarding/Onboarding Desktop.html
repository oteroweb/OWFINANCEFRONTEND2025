<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>OW Finance · Onboarding Desktop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .material-icons { font-family: 'Material Icons', sans-serif; font-style: normal;
      display: inline-flex; align-items: center; justify-content: center; line-height: 1;
      letter-spacing: normal; text-transform: none; white-space: nowrap; word-wrap: normal;
      direction: ltr; -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: radial-gradient(ellipse at 50% 18%, #18202F 0%, #080B12 100%); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 26px 22px 40px; }

    /* Flow map (route jumper) */
    .map { width: 100%; max-width: 1180px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .map .grp { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #5A6478; padding: 0 8px 0 4px; }
    .map button { border: 0; cursor: pointer; background: rgba(255,255,255,0.06); color: #C3CAD6; font-family: var(--font-body); font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; transition: background 140ms, color 140ms; }
    .map button:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .map button.active { background: var(--brand-primary); color: #fff; }
    .map button .n { font-family: var(--font-money); font-size: 10px; opacity: 0.7; }
    .map .arrow { color: #3A4456; font-size: 16px; }

    /* Browser chrome */
    .browser { width: 100%; max-width: 1180px; border-radius: 14px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05); background: var(--surface-1); }
    .chrome { display: flex; align-items: center; gap: 12px; padding: 11px 16px; background: #1d2230; border-bottom: 1px solid rgba(255,255,255,0.06); }
    [data-theme="light"] .chrome { background: #E4E7EE; border-bottom-color: rgba(0,0,0,0.06); }
    .lights { display: flex; gap: 8px; }
    .lights span { width: 12px; height: 12px; border-radius: 50%; }
    .urlbar { flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; padding: 7px 14px; font-family: var(--font-body); font-size: 12.5px; color: #9AA3B2; max-width: 420px; margin: 0 auto; }
    [data-theme="light"] .urlbar { background: rgba(0,0,0,0.06); color: #5A6478; }
    .urlbar .material-icons { font-size: 14px; }
    #viewport { height: 760px; overflow: hidden; background: var(--bg-canvas); position: relative; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <nav class="map" id="map"></nav>
  <div class="browser">
    <div class="chrome">
      <div class="lights"><span style="background:#FF5F57"></span><span style="background:#FEBC2E"></span><span style="background:#28C840"></span></div>
      <div class="urlbar"><span class="material-icons">lock</span>app.owfinance.com</div>
      <div style="width:54px"></div>
    </div>
    <div id="viewport"><div id="root"></div></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Reusados del kit mobile (átomos genéricos + datos de perfil) -->
  <script type="text/babel" src="../ui_kits/mobile/components/Atoms.jsx"></script>
  <script type="text/babel" src="../ui_kits/mobile/profile-data.jsx"></script>
  <script type="text/babel" src="../ui_kits/mobile/components/ProfileComponents.jsx"></script>

  <!-- Onboarding compartido + desktop -->
  <script type="text/babel" src="onb-atoms.jsx"></script>
  <script type="text/babel" src="flow-data.jsx"></script>
  <script type="text/babel" src="gamification.jsx"></script>
  <script type="text/babel" src="flow-desktop.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    const ROUTES = [
      { group: 'Entrada', items: [{ id: 'landing', label: 'Landing', n: 1 }, { id: 'register', label: 'Registro', n: 2 }, { id: 'login', label: 'Login', n: 3 }] },
      { group: 'Onboarding', items: [{ id: 'intro', label: 'Intro', n: 4 }, { id: 'wizard', label: 'Wizard', n: 5 }, { id: 'recommend', label: 'Recomendación', n: 6 }, { id: 'summary', label: 'Resumen', n: 7 }, { id: 'done', label: 'Listo', n: 8 }] },
      { group: 'App', items: [{ id: 'app', label: 'Dashboard (handoff)', n: 9 }] },
    ];

    function Root() {
      const [route, setRoute] = useState('landing');
      const mapEl = document.getElementById('map');
      React.useEffect(() => {
        mapEl.innerHTML = '';
        ROUTES.forEach((grp, gi) => {
          const g = document.createElement('span'); g.className = 'grp'; g.textContent = grp.group; mapEl.appendChild(g);
          grp.items.forEach(it => {
            const b = document.createElement('button');
            b.className = it.id === route ? 'active' : '';
            b.innerHTML = `<span class="n">${it.n}</span>${it.label}`;
            b.onclick = () => setRoute(it.id);
            mapEl.appendChild(b);
          });
          if (gi < ROUTES.length - 1) { const a = document.createElement('span'); a.className = 'material-icons arrow'; a.textContent = 'chevron_right'; mapEl.appendChild(a); }
        });
      }, [route]);
      return <OnboardingDesktop key={route} startRoute={route} />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
