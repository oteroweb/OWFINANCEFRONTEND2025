<!DOCTYPE html>
<!-- ARCHIVADO (jun 2026): versión rota — referenciaba .jsx en rutas planas que se movieron a subcarpetas. Fuente de verdad: ui_kits/lite-desktop/index.html -->
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>OW Finance · Desktop UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .material-icons {
      font-family: 'Material Icons', sans-serif; font-style: normal;
      display: inline-flex; align-items: center; justify-content: center;
      line-height: 1; letter-spacing: normal; text-transform: none;
      white-space: nowrap; direction: ltr;
      -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }

    /* ── Demo toolbar ───────────────────────────────────────── */
    #demo-toolbar {
      position: fixed; top: 14px; right: 14px; z-index: 9000;
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface-1);
      border-radius: 999px; padding: 5px;
      box-shadow: var(--shadow-float);
    }
    #demo-toolbar .sep {
      width: 1px; height: 20px; background: var(--border-hairline);
      margin: 0 2px;
    }
    #demo-toolbar button {
      border: 0; cursor: pointer; padding: 6px 14px;
      border-radius: 999px;
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      background: transparent; color: var(--fg-2);
      display: inline-flex; align-items: center; gap: 5px;
      transition: background 150ms, color 150ms;
    }
    #demo-toolbar button .material-icons { font-size: 14px; }
    #demo-toolbar button.active {
      background: var(--brand-primary); color: #fff; font-weight: 600;
    }
    #demo-toolbar button.active-pro {
      background: var(--info); color: #fff; font-weight: 600;
    }
    #demo-toolbar .mode-label {
      font-family: var(--font-body); font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);
      padding: 0 4px;
    }
  </style>
</head>
<body>

  <!-- ── Demo toolbar ─────────────────────────────────────────── -->
  <div id="demo-toolbar">
    <span class="mode-label">Modo</span>
    <button id="btn-lite" class="active" data-mode="lite">
      <span class="material-icons">view_agenda</span>Lite
    </button>
    <button id="btn-pro" data-mode="pro">
      <span class="material-icons">dashboard</span>Pro
    </button>
    <div class="sep"></div>
    <span class="mode-label">Tema</span>
    <button data-theme-set="light" class="active">
      <span class="material-icons">light_mode</span>Light
    </button>
    <button data-theme-set="dark">
      <span class="material-icons">dark_mode</span>Dark
    </button>
  </div>

  <template id="__bundler_thumbnail" data-bg-color="#0a5e3e">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0a5e3e"/>
      <g transform="translate(600 400)">
        <circle r="180" fill="#0d7a52"/>
        <text x="0" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
              font-size="180" font-weight="800" fill="#ffffff" letter-spacing="-6">OW</text>
      </g>
      <text x="600" y="640" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
            font-size="32" font-weight="600" fill="#7fd9b3" letter-spacing="4">FINANCE · DESKTOP</text>
    </svg>
  </template>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ── Atoms ─────────────────────────────────────────────────── -->
  <script type="text/babel" src="Bits.jsx"></script>
  <script type="text/babel" src="Buttons.jsx"></script>
  <script type="text/babel" src="Chips.jsx"></script>

  <!-- ── Lite chrome ───────────────────────────────────────────── -->
  <script type="text/babel" src="LiteHeader.jsx"></script>
  <script type="text/babel" src="LiteNavPill.jsx"></script>
  <script type="text/babel" src="ExpandedMenu.jsx"></script>

  <!-- ── Shared desktop modals (Lite + Pro) ───────────────────── -->
  <script type="text/babel" src="ExchangeRatesWidget.jsx"></script>
  <script type="text/babel" src="DesktopQuickModal.jsx"></script>
  <script type="text/babel" src="SmartTransactionModal.jsx"></script>
  <script type="text/babel" src="AIAdvisorPanel.jsx"></script>

  <!-- ── Financial display components ─────────────────────────── -->
  <script type="text/babel" src="HeroBalance.jsx"></script>
  <script type="text/babel" src="JarsPreview.jsx"></script>
  <script type="text/babel" src="RecentTransactions.jsx"></script>

  <!-- ── Data ─────────────────────────────────────────────────── -->
  <script type="text/babel" src="sample-data.jsx"></script>

  <!-- ── Lite routes ───────────────────────────────────────────── -->
  <script type="text/babel" src="routes/HomeRoute.jsx"></script>
  <script type="text/babel" src="routes/TransactionsRoute.jsx"></script>
  <script type="text/babel" src="routes/JarsRoute.jsx"></script>
  <script type="text/babel" src="routes/ConfigRoute.jsx"></script>

  <!-- ── Pro route + panels ───────────────────────────────────── -->
  <script type="text/babel" src="routes/ProHomeRoute.jsx"></script>
  <script type="text/babel" src="AccountsPanel.jsx"></script>

  <!-- ── Shells ───────────────────────────────────────────────── -->
  <script type="text/babel" src="LiteShell.jsx"></script>
  <script type="text/babel" src="ProShell.jsx"></script>

  <!-- ── Mount + toolbar wiring ───────────────────────────────── -->
  <script type="text/babel">
    let currentMode = 'lite';
    const reactRoot = ReactDOM.createRoot(document.getElementById('root'));

    function renderApp() {
      if (currentMode === 'pro') {
        reactRoot.render(<ProShell />);
      } else {
        reactRoot.render(<LiteShell />);
      }
    }

    renderApp();
  </script>

  <script>
    // ── Toolbar wiring (plain JS, runs after Babel mounts) ──────
    const toolbar = document.getElementById('demo-toolbar');

    // Honor ?theme= URL param
    const urlTheme = new URLSearchParams(location.search).get('theme');
    if (urlTheme === 'dark' || urlTheme === 'light') {
      document.documentElement.setAttribute('data-theme', urlTheme);
      toolbar.querySelectorAll('[data-theme-set]').forEach(b =>
        b.classList.toggle('active', b.getAttribute('data-theme-set') === urlTheme)
      );
    }

    // Honor ?mode= URL param
    const urlMode = new URLSearchParams(location.search).get('mode');
    if (urlMode === 'pro') {
      document.getElementById('btn-lite').classList.remove('active');
      document.getElementById('btn-pro').classList.add('active-pro');
    }

    toolbar.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      // Theme toggle
      const theme = btn.getAttribute('data-theme-set');
      if (theme) {
        document.documentElement.setAttribute('data-theme', theme);
        toolbar.querySelectorAll('[data-theme-set]').forEach(b =>
          b.classList.toggle('active', b === btn)
        );
        return;
      }

      // Mode toggle
      const mode = btn.getAttribute('data-mode');
      if (mode) {
        currentMode = mode; // eslint-disable-line no-undef
        document.getElementById('btn-lite').classList.toggle('active',     mode === 'lite');
        document.getElementById('btn-lite').classList.toggle('active-pro', false);
        document.getElementById('btn-pro').classList.toggle('active-pro',  mode === 'pro');
        document.getElementById('btn-pro').classList.toggle('active',      false);
        renderApp(); // eslint-disable-line no-undef
      }
    });
  </script>
</body>
</html>
