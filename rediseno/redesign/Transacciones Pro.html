<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>OW Finance · Transacciones Pro — Redesign (staging)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .material-icons {
      font-family: 'Material Icons', sans-serif; font-style: normal;
      display: inline-flex; align-items: center; justify-content: center;
      line-height: 1; letter-spacing: normal; text-transform: none;
      white-space: nowrap; direction: ltr;
      -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg-canvas); }
    body { font-family: var(--font-body); color: var(--fg-1); }

    /* staging banner */
    #stage-flag {
      position: sticky; top: 0; z-index: 9000;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 18px; font-size: 12px; font-weight: 600;
      background: #0F172A; color: #fff;
      font-family: var(--font-body);
    }
    #stage-flag .tag {
      font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
      background: var(--info); color: #fff; padding: 2px 8px; border-radius: 999px;
    }
    #stage-flag .muted { color: #94A3B8; font-weight: 500; }
  </style>
</head>
<body>
  <div id="stage-flag">
    <span class="tag">Redesign · staging</span>
    Transacciones Pro — nuevo modelo de interacción
    <span class="muted">·  hover = seleccionar · doble clic = sumar varios · doble clic categoría = filtrar</span>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx?v=2"></script>
  <script type="text/babel" src="TxPoolsHeader.jsx?v=2"></script>
  <script type="text/babel" src="TxLedger.jsx?v=2"></script>
  <script type="text/babel" src="app.jsx?v=2"></script>
</body>
</html>
