<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="design_doc_mode" content="canvas">
<title>OW Finance · Selector de categorías — Exploración 2.1</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  .material-icons{font-family:'Material Icons';font-style:normal;display:inline-flex;align-items:center;justify-content:center;line-height:1;vertical-align:middle;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .lbl{font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.04em;color:#0F172A;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .lbl .tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:#fff;color:#475569;border:1px solid rgba(15,23,42,.1)}
  .lbl .pf{font-weight:600;color:#475569;letter-spacing:0}
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

/* ── Cántaros (canónicos) + color de despliegue tuneado para dark ───────── */
const JARS = {
  j1: { name: 'Necesidades básicas', short: 'Necesidades', pct: 55, icon: 'home',        c: '#5B7FD6' },
  j2: { name: 'Diversión',           short: 'Diversión',   pct: 10, icon: 'celebration', c: '#F59E0B' },
  j3: { name: 'Ahorro',              short: 'Ahorro',      pct: 10, icon: 'savings',     c: '#10B981' },
  j4: { name: 'Educación',           short: 'Educación',   pct: 10, icon: 'school',      c: '#0EA5E9' },
  j5: { name: 'Reservas',            short: 'Reservas',    pct: 10, icon: 'shield',      c: '#8B5CF6' },
};
const CATS = [
  { id: 1,  name: 'Vivienda',       icon: 'home',           jar: 'j1' },
  { id: 2,  name: 'Supermercado',   icon: 'shopping_cart',  jar: 'j1' },
  { id: 3,  name: 'Servicios',      icon: 'bolt',           jar: 'j1' },
  { id: 4,  name: 'Transporte',     icon: 'directions_car', jar: 'j1' },
  { id: 5,  name: 'Salud',          icon: 'favorite',       jar: 'j1' },
  { id: 6,  name: 'Restaurantes',   icon: 'restaurant',     jar: 'j2' },
  { id: 7,  name: 'Entretenimiento',icon: 'sports_esports', jar: 'j2' },
  { id: 8,  name: 'Ropa',           icon: 'checkroom',      jar: 'j2' },
  { id: 9,  name: 'Suscripciones',  icon: 'subscriptions',  jar: 'j2' },
  { id: 11, name: 'Inversión',      icon: 'trending_up',    jar: 'j3' },
  { id: 10, name: 'Educación',      icon: 'school',         jar: 'j4' },
  { id: 12, name: 'Otros',          icon: 'category',       jar: 'j5' },
];
const GROUPS = ['j1', 'j2', 'j3', 'j4', 'j5'];
const catsOf = (j) => CATS.filter(c => c.jar === j);
const tint = (hex, pct) => `color-mix(in srgb, ${hex} ${pct}%, var(--surface-1))`;

/* ════════════════════════════ Shared atoms ════════════════════════════ */
function SearchBox({ placeholder = 'Buscar categoría…', value = '', big }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9, background: 'var(--surface-2)', border: '1px solid var(--border-hairline)', borderRadius: 'var(--radius-sm)', padding: big ? '13px 14px' : '10px 13px' }}>
      <span className="material-icons" style={{ fontSize: big ? 21 : 18, color: 'var(--fg-3)' }}>search</span>
      <span style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: big ? 15 : 13.5, color: value ? 'var(--fg-1)' : 'var(--fg-3)' }}>{value || placeholder}</span>
      {value && <span className="material-icons" style={{ fontSize: 18, color: 'var(--fg-3)' }}>close</span>}
    </div>
  );
}

/* The teaching moment shared by all variants: jar enters anchored to category */
function AnchoredBanner({ jarKey, compact }) {
  const j = JARS[jarKey];
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: compact ? '10px 12px' : '12px 14px', borderRadius: 'var(--radius-md)', background: tint(j.c, 12), border: `1px solid ${tint(j.c, 34)}` }}>
      <span style={{ width: 30, height: 30, borderRadius: 9, background: j.c, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <span className="material-icons" style={{ fontSize: 18, color: '#fff' }}>{j.icon}</span>
      </span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 10, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>Cántaro · anclado</div>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 13.5, fontWeight: 700, color: 'var(--fg-1)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{j.name} · {j.pct}%</div>
      </div>
      <span className="material-icons" title="Definido por la categoría" style={{ fontSize: 16, color: 'var(--fg-3)' }}>lock</span>
    </div>
  );
}

function JarDot({ jarKey, size = 9 }) {
  return <span style={{ width: size, height: size, borderRadius: 3, background: JARS[jarKey].c, flexShrink: 0, display: 'inline-block' }} />;
}

/* ═══════════════════ VARIANT A · Secciones por cántaro ═══════════════════ */
function VariantA({ selectedId }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <SearchBox />
      {GROUPS.map(jk => {
        const j = JARS[jk];
        return (
          <div key={jk} style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <JarDot jarKey={jk} />
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 11.5, fontWeight: 700, letterSpacing: '.04em', color: j.c }}>{j.name.toUpperCase()}</span>
              <span style={{ fontFamily: 'var(--font-money)', fontSize: 11, color: 'var(--fg-3)' }}>{j.pct}%</span>
              <div style={{ flex: 1, height: 1, background: 'var(--border-hairline)' }} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 7 }}>
              {catsOf(jk).map(c => {
                const on = c.id === selectedId;
                return (
                  <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '9px 11px', borderRadius: 'var(--radius-sm)', background: on ? tint(j.c, 18) : 'var(--surface-2)', border: `1px solid ${on ? tint(j.c, 50) : 'transparent'}` }}>
                    <span className="material-icons" style={{ fontSize: 18, color: on ? j.c : 'var(--fg-2)' }}>{c.icon}</span>
                    <span style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: on ? 700 : 500, color: 'var(--fg-1)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.name}</span>
                    {on && <span className="material-icons" style={{ fontSize: 16, color: j.c }}>check_circle</span>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════ VARIANT B · Cuadrícula coloreada ═══════════════════ */
function VariantB({ selectedId }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <SearchBox />
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {GROUPS.map(jk => (
          <span key={jk} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '4px 9px', borderRadius: 999, background: tint(JARS[jk].c, 14), border: `1px solid ${tint(JARS[jk].c, 30)}` }}>
            <JarDot jarKey={jk} size={7} />
            <span style={{ fontFamily: 'var(--font-body)', fontSize: 10.5, fontWeight: 600, color: 'var(--fg-2)' }}>{JARS[jk].short}</span>
          </span>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
        {CATS.map(c => {
          const j = JARS[c.jar];
          const on = c.id === selectedId;
          return (
            <div key={c.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 7, padding: '13px 6px', borderRadius: 'var(--radius-md)', background: on ? j.c : tint(j.c, 10), border: `1px solid ${on ? j.c : tint(j.c, 26)}`, minHeight: 78, position: 'relative' }}>
              {!on && <span style={{ position: 'absolute', top: 7, right: 7, width: 6, height: 6, borderRadius: 2, background: j.c }} />}
              <span className="material-icons" style={{ fontSize: 23, color: on ? '#fff' : j.c }}>{c.icon}</span>
              <span style={{ fontFamily: 'var(--font-body)', fontSize: 11.5, fontWeight: on ? 700 : 600, color: on ? '#fff' : 'var(--fg-1)', textAlign: 'center', lineHeight: 1.15 }}>{c.name}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════ VARIANT C · Buscar primero ═══════════════════ */
function VariantC({ selectedId }) {
  const freq = [2, 6, 1, 9];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <SearchBox placeholder="Escribe para buscar…" value="su" big />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <span style={{ fontFamily: 'var(--font-body)', fontSize: 10.5, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--fg-3)' }}>Frecuentes</span>
        <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap' }}>
          {freq.map(id => { const c = CATS.find(x => x.id === id); const j = JARS[c.jar];
            return (
              <span key={id} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '7px 11px', borderRadius: 999, background: 'var(--surface-2)', border: '1px solid var(--border-hairline)' }}>
                <span className="material-icons" style={{ fontSize: 15, color: j.c }}>{c.icon}</span>
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 12.5, fontWeight: 600, color: 'var(--fg-1)' }}>{c.name}</span>
              </span>
            );
          })}
        </div>
      </div>
      <div style={{ height: 1, background: 'var(--border-hairline)' }} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {[CATS.find(c => c.id === 9), CATS.find(c => c.id === 3)].map(c => {
          const j = JARS[c.jar]; const on = c.id === selectedId;
          return (
            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '11px 12px', borderRadius: 'var(--radius-sm)', background: on ? tint(j.c, 14) : 'transparent', border: `1px solid ${on ? tint(j.c, 40) : 'transparent'}` }}>
              <span style={{ width: 32, height: 32, borderRadius: 9, background: tint(j.c, 16), display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <span className="material-icons" style={{ fontSize: 18, color: j.c }}>{c.icon}</span>
              </span>
              <span style={{ flex: 1, fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: on ? 700 : 500, color: 'var(--fg-1)' }}>{c.name}</span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '4px 9px', borderRadius: 999, background: tint(j.c, 14) }}>
                <JarDot jarKey={c.jar} size={7} />
                <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, color: 'var(--fg-2)' }}>{j.short}</span>
              </span>
            </div>
          );
        })}
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 11.5, color: 'var(--fg-3)', padding: '6px 12px' }}>2 resultados para "su"</div>
      </div>
    </div>
  );
}

const VARIANTS = { A: VariantA, B: VariantB, C: VariantC };
const SEL = { A: 2, B: 6, C: 9 }; // categoría preseleccionada por variante (para mostrar el cántaro anclado)
const PICKED_LABEL = { A: 'Supermercado', B: 'Restaurantes', C: 'Suscripciones' };

/* ════════════════════════ Mobile sheet shell ════════════════════════ */
function MobileSheet({ variant }) {
  const V = VARIANTS[variant];
  return (
    <div style={{ position: 'relative', width: 390, height: 720, borderRadius: 34, overflow: 'hidden', background: 'var(--bg-canvas)', boxShadow: '0 30px 70px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.05)' }}>
      {/* dimmed form behind */}
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.45)' }} />
      <div style={{ position: 'absolute', inset: 0, padding: '54px 18px', opacity: .25 }}>
        {['Monto', 'Cuenta', 'Categoría'].map((l, i) => (
          <div key={i} style={{ height: i === 0 ? 56 : 44, borderRadius: 12, background: 'var(--surface-3)', marginBottom: 12 }} />
        ))}
      </div>
      {/* sheet */}
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, maxHeight: 638, background: 'var(--surface-1)', borderTopLeftRadius: 26, borderTopRightRadius: 26, display: 'flex', flexDirection: 'column', boxShadow: '0 -10px 40px rgba(0,0,0,.35)' }}>
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 10 }}><div style={{ width: 38, height: 4, borderRadius: 2, background: 'var(--surface-3)' }} /></div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 18px 10px' }}>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 700, color: 'var(--fg-1)' }}>Categoría</span>
          <span style={{ width: 30, height: 30, borderRadius: 999, background: 'var(--surface-2)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><span className="material-icons" style={{ fontSize: 18, color: 'var(--fg-2)' }}>close</span></span>
        </div>
        <div style={{ flex: 1, overflow: 'hidden', padding: '4px 18px 8px', maskImage: 'linear-gradient(to bottom, #000 92%, transparent)' }}>
          <V selectedId={SEL[variant]} />
        </div>
        <div style={{ padding: '12px 18px 22px', borderTop: '1px solid var(--border-hairline)', display: 'flex', flexDirection: 'column', gap: 12, background: 'var(--surface-1)' }}>
          <AnchoredBanner jarKey={CATS.find(c => c.id === SEL[variant]).jar} compact />
          <button style={{ border: 0, cursor: 'pointer', width: '100%', padding: '14px', borderRadius: 'var(--radius-md)', background: 'var(--brand-primary)', color: '#fff', fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 700 }}>Usar “{PICKED_LABEL[variant]}”</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ Desktop popover shell ════════════════════════ */
function DesktopPopover({ variant }) {
  const V = VARIANTS[variant];
  const j = CATS.find(c => c.id === SEL[variant]).jar;
  return (
    <div style={{ width: 384, fontFamily: 'var(--font-body)' }}>
      {/* the Categoría field (trigger) */}
      <div style={{ marginBottom: 9 }}>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 600, color: 'var(--fg-2)', marginBottom: 6 }}>Categoría <span style={{ color: 'var(--expense)' }}>*</span></div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '11px 13px', borderRadius: 'var(--radius-sm)', background: 'var(--surface-1)', border: '1px solid var(--brand-primary)' }}>
          <span className="material-icons" style={{ fontSize: 18, color: JARS[j].c }}>{CATS.find(c => c.id === SEL[variant]).icon}</span>
          <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: 'var(--fg-1)' }}>{PICKED_LABEL[variant]}</span>
          <span className="material-icons" style={{ fontSize: 20, color: 'var(--fg-3)' }}>expand_less</span>
        </div>
      </div>
      {/* popover */}
      <div style={{ background: 'var(--surface-1)', border: '1px solid var(--border-hairline)', borderRadius: 'var(--radius-lg)', boxShadow: '0 24px 60px rgba(0,0,0,.5)', overflow: 'hidden' }}>
        <div style={{ maxHeight: 392, overflow: 'hidden', padding: '16px 16px 6px', maskImage: 'linear-gradient(to bottom, #000 93%, transparent)' }}>
          <V selectedId={SEL[variant]} />
        </div>
        <div style={{ padding: '11px 16px 14px', borderTop: '1px solid var(--border-hairline)' }}>
          <AnchoredBanner jarKey={j} compact />
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ Canvas frame builder ════════════════════════ */
function frame(left, top, width, label, platform, node) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${width}px`;
  const lab = document.createElement('div');
  lab.className = 'lbl'; lab.setAttribute('data-drags-parent', '1');
  lab.innerHTML = label + (platform ? ` <span class="pf">· ${platform}</span>` : '');
  wrap.appendChild(lab);
  const card = document.createElement('div');
  wrap.appendChild(card);
  document.body.appendChild(wrap);
  ReactDOM.createRoot(card).render(node);
}

/* Intro card */
function Intro() {
  return (
    <div style={{ width: 600, background: 'var(--surface-1)', border: '1px solid var(--border-hairline)', borderRadius: 'var(--radius-xl)', padding: '30px 32px', boxShadow: '0 20px 50px rgba(0,0,0,.4)' }}>
      <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', color: 'var(--info-fg)' }}>Fase 2 · Pieza 2.1</div>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 27, fontWeight: 700, color: 'var(--fg-1)', margin: '8px 0 12px', letterSpacing: '-.01em' }}>Selector de categorías</div>
      <p style={{ margin: 0, fontSize: 14.5, lineHeight: 1.55, color: 'var(--fg-2)' }}>Tres enfoques sobre el mismo catálogo común. En los tres, <b style={{ color: 'var(--fg-1)' }}>eliges la categoría y el cántaro entra anclado</b> (franja inferior con candado) — nunca se elige a mano. Cambian en <i>cómo</i> navegas: por estructura, por color o por velocidad.</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 20 }}>
        {[
          ['A', 'Secciones por cántaro', 'La lista se divide en secciones, una por cántaro. La relación categoría→cántaro es estructural: eliges dentro del grupo. Enseña la jerarquía.', '#5B7FD6'],
          ['B', 'Cuadrícula coloreada', 'Mosaico de categorías tintadas con el color de su cántaro + leyenda arriba. Escaneo visual rápido; el color enseña el mapeo.', '#F59E0B'],
          ['C', 'Buscar primero', 'Buscador dominante + “Frecuentes” + lista filtrada en vivo, con el cántaro como píldora al final de cada fila. Optimizado para quien registra rápido.', '#10B981'],
        ].map(([k, t, d, c]) => (
          <div key={k} style={{ display: 'flex', gap: 13 }}>
            <span style={{ flexShrink: 0, width: 30, height: 30, borderRadius: 9, background: tint(c, 16), color: c, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14 }}>{k}</span>
            <div><div style={{ fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 700, color: 'var(--fg-1)' }}>{t}</div><div style={{ fontSize: 12.5, lineHeight: 1.5, color: 'var(--fg-2)', marginTop: 2 }}>{d}</div></div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 20, padding: '12px 14px', borderRadius: 'var(--radius-md)', background: 'var(--surface-2)', fontSize: 12.5, lineHeight: 1.5, color: 'var(--fg-2)' }}>
        <b style={{ color: 'var(--fg-1)' }}>Recomendación →</b> Híbrido <b style={{ color: 'var(--fg-1)' }}>A + C</b>: secciones por cántaro como vista base (enseña el modelo) y el buscador siempre visible arriba que colapsa a lista plana al escribir. Lo cableo a ambos forms cuando elijas.
      </div>
    </div>
  );
}

/* Layout the canvas */
frame(40, 40, 600, 'Resumen de la exploración', '', <Intro />);

frame(700,  40, 390, 'Variante A — Secciones por cántaro', 'Mobile · sheet', <MobileSheet variant="A" />);
frame(1140, 40, 390, 'Variante B — Cuadrícula coloreada', 'Mobile · sheet', <MobileSheet variant="B" />);
frame(1580, 40, 390, 'Variante C — Buscar primero', 'Mobile · sheet', <MobileSheet variant="C" />);

frame(700,  820, 384, 'Variante A — Secciones por cántaro', 'Desktop · popover', <DesktopPopover variant="A" />);
frame(1140, 820, 384, 'Variante B — Cuadrícula coloreada', 'Desktop · popover', <DesktopPopover variant="B" />);
frame(1580, 820, 384, 'Variante C — Buscar primero', 'Desktop · popover', <DesktopPopover variant="C" />);
</script>
</body>
</html>
