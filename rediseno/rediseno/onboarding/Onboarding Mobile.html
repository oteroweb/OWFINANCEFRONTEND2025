<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>OW Finance · Onboarding Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .material-icons { font-family: 'Material Icons', sans-serif; font-style: normal;
      display: inline-flex; align-items: center; justify-content: center;
      line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap;
      word-wrap: normal; direction: ltr; -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(ellipse at 50% 22%, #1A2230 0%, #0A0D14 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 28px 20px; font-family: var(--font-body);
    }
    .stage { display: flex; align-items: center; gap: 46px; flex-wrap: wrap; justify-content: center; }
    .phone-outer { width: 408px; height: 858px; position: relative; flex-shrink: 0; }
    .phone-body { position: absolute; inset: 0; border-radius: 56px;
      background: linear-gradient(160deg, #23262F 0%, #14161D 100%);
      box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.10), inset 0 0 0 3px #0C0D12,
        0 40px 100px rgba(0,0,0,0.82), 0 0 0 1px rgba(255,255,255,0.04); }
    .phone-screen { position: absolute; top: 16px; left: 16px; right: 16px; bottom: 16px;
      border-radius: 44px; overflow: hidden; background: var(--bg-canvas); }
    .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 112px; height: 32px; border-radius: 16px; background: #0B0C10; z-index: 300;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05); }
    #root { height: 100%; }
    /* Map selector (left of phone) */
    .flowmap { width: 230px; color: #E7ECF5; }
    .flowmap h3 { font-family: var(--font-display); font-weight: 700; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase; color: #8A94A6; margin-bottom: 14px; }
    .flowmap button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left;
      border: 0; background: transparent; cursor: pointer; padding: 9px 11px; border-radius: 11px;
      color: #C3CAD6; font-family: var(--font-body); font-size: 13.5px; font-weight: 600;
      transition: background 140ms, color 140ms; }
    .flowmap button:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .flowmap button.active { background: rgba(255,255,255,0.10); color: #fff; }
    .flowmap .num { width: 22px; height: 22px; border-radius: 11px; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08); font-family: var(--font-money); font-size: 11px; font-weight: 700; }
    .flowmap button.active .num { background: var(--brand-primary); color: #fff; }
    .flowmap .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #5A6478; margin: 16px 0 6px 11px; }
    .flowmap .group-label:first-of-type { margin-top: 0; }
    @media (max-height: 920px) { .phone-outer { transform: scale(0.84); transform-origin: center; } }
    @media (max-width: 760px) { .flowmap { display: none; } }
  </style>
</head>
<body>
  <div class="stage">
    <nav class="flowmap" id="flowmap"></nav>
    <div class="phone-outer">
      <div class="phone-body"></div>
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div id="root"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Componentes y datos reutilizados del kit mobile -->
  <script type="text/babel" src="../ui_kits/mobile/components/Atoms.jsx"></script>
  <script type="text/babel" src="../ui_kits/mobile/profile-data.jsx"></script>
  <script type="text/babel" src="../ui_kits/mobile/components/ProfileComponents.jsx"></script>

  <!-- Onboarding -->
  <script type="text/babel" src="onb-atoms.jsx"></script>
  <script type="text/babel" src="flow-data.jsx"></script>
  <script type="text/babel" src="gamification.jsx"></script>
  <script type="text/babel" src="profile-panel.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="flow.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const ROUTES = [
      { group: 'Entrada', items: [
        { id: 'welcome', label: 'Bienvenida', n: 1 },
        { id: 'register', label: 'Registro', n: 2 },
        { id: 'login', label: 'Iniciar sesión', n: 3 },
      ]},
      { group: 'Onboarding', items: [
        { id: 'intro', label: 'Intro · express/full', n: 4 },
        { id: 'wizard', label: 'Wizard perfil', n: 5 },
        { id: 'recommend', label: 'Recomendación IA', n: 6 },
        { id: 'summary', label: 'Resumen', n: 7 },
        { id: 'done', label: 'Listo', n: 8 },
      ]},
      { group: 'App · gamificación', items: [
        { id: 'panel', label: 'Panel + progreso', n: 9 },
        { id: 'profile', label: 'Mi perfil (niveles)', n: 10 },
      ]},
    ];

    function Root() {
      const [route, setRoute] = useState('welcome');
      // Rebuild flow when jumping via the map
      const mapEl = document.getElementById('flowmap');
      React.useEffect(() => {
        mapEl.innerHTML = '<h3>Rutas</h3>';
        ROUTES.forEach(grp => {
          const gl = document.createElement('div'); gl.className = 'group-label'; gl.textContent = grp.group; mapEl.appendChild(gl);
          grp.items.forEach(it => {
            const b = document.createElement('button');
            b.className = 'route-btn' + (it.id === route ? ' active' : '');
            b.innerHTML = `<span class="num">${it.n}</span>${it.label}`;
            b.onclick = () => setRoute(it.id);
            mapEl.appendChild(b);
          });
        });
      }, [route]);

      return <OnboardingFlow key={route} startRoute={route} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
