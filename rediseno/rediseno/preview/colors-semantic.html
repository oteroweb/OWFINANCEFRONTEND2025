<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Semantic" subtitle="Income, expense, warning, info + softs" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw {
    border-radius: var(--radius-md);
    padding: 14px;
    height: 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: var(--shadow-card);
  }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 12px; }
  .hex  { font-family: var(--font-body); font-size: 11px; opacity: 0.8; font-variant-numeric: tabular-nums; }
  .label { font-family: var(--font-body); font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
  .stripe { display: flex; gap: 6px; align-items: flex-end; }
  .dot { width: 14px; height: 14px; border-radius: 999px; }
  .dark-on { color: var(--slate-900); }
  .light-on { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light-on" style="background: var(--emerald-500);">
      <div class="label">Income / Success</div>
      <div>
        <div class="name">--income</div>
        <div class="hex">#10B981</div>
      </div>
    </div>
    <div class="sw light-on" style="background: var(--red-500);">
      <div class="label">Expense / Danger</div>
      <div>
        <div class="name">--expense</div>
        <div class="hex">#EF4444</div>
      </div>
    </div>
    <div class="sw dark-on" style="background: var(--amber-500);">
      <div class="label">Warning</div>
      <div>
        <div class="name">--warning</div>
        <div class="hex">#F59E0B</div>
      </div>
    </div>
    <div class="sw light-on" style="background: var(--cyan-500);">
      <div class="label">Info accent</div>
      <div>
        <div class="name">--info</div>
        <div class="hex">#0EA5E9</div>
      </div>
    </div>

    <div class="sw dark-on" style="background: var(--emerald-100);">
      <div class="label">soft</div>
      <div><div class="name">income-soft</div><div class="hex">#D1FAE5</div></div>
    </div>
    <div class="sw dark-on" style="background: var(--red-100);">
      <div class="label">soft</div>
      <div><div class="name">expense-soft</div><div class="hex">#FEE2E2</div></div>
    </div>
    <div class="sw dark-on" style="background: var(--amber-100);">
      <div class="label">soft</div>
      <div><div class="name">warning-soft</div><div class="hex">#FEF3C7</div></div>
    </div>
    <div class="sw dark-on" style="background: var(--cyan-100);">
      <div class="label">soft</div>
      <div><div class="name">info-soft</div><div class="hex">#E0F2FE</div></div>
    </div>
  </div>
</body>
</html>
