<!DOCTYPE html>
<!-- @dsCard group="Components" name="Lite Desktop header" subtitle="Avatar + greeting + ccy + actions" viewport="900x130" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 28px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  .left { display: flex; align-items: center; gap: 14px; }
  .avatar {
    width: 40px; height: 40px; border-radius: var(--radius-pill);
    background: var(--brand-primary); color: var(--fg-on-brand);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 600; font-size: 16px;
  }
  .greet { display: flex; flex-direction: column; }
  .hi { font-family: var(--font-body); font-size: 12px; color: var(--fg-2); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--fg-1); }
  .right { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: var(--radius-pill);
    background: var(--surface-1); box-shadow: var(--shadow-card);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-1); border: 0; cursor: pointer;
  }
  .icon-btn .material-icons { font-size: 20px; }
  .ccy {
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; padding: 8px 14px;
    background: var(--surface-1); color: var(--fg-1);
    border-radius: var(--radius-pill); box-shadow: var(--shadow-card);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--income); }
</style>
</head>
<body>
  <div class="left">
    <div class="avatar">J</div>
    <div class="greet">
      <span class="hi">Good afternoon,</span>
      <span class="name">José</span>
    </div>
  </div>
  <div class="right">
    <span class="ccy"><span class="dot"></span>USD</span>
    <button class="icon-btn" aria-label="visibility"><span class="material-icons">visibility</span></button>
    <button class="icon-btn" aria-label="notifications"><span class="material-icons">notifications</span></button>
    <button class="icon-btn" aria-label="menu"><span class="material-icons">menu</span></button>
  </div>
</body>
</html>
