<!DOCTYPE html>
<!-- @dsCard group="Components" name="Chips" subtitle="Currency, brand, semantic" viewport="700x120" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-canvas); }
  body { padding: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-body); font-weight: 500; font-size: 12px;
    padding: 6px 12px; border-radius: var(--radius-pill);
    background: var(--surface-2); color: var(--fg-1);
  }
  .chip.currency { background: var(--surface-1); box-shadow: var(--shadow-card); font-weight: 600; letter-spacing: 0.04em; }
  .chip.income { background: var(--income-soft); color: var(--income-fg); }
  .chip.expense { background: var(--expense-soft); color: var(--expense-fg); }
  .chip.warning { background: var(--warning-soft); color: var(--warning-fg); }
  .chip.info { background: var(--info-soft); color: var(--info-fg); }
  .chip.brand { background: var(--brand-primary-soft); color: var(--brand-primary-fg-soft); font-weight: 600; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
</style>
</head>
<body>
  <span class="chip currency">USD</span>
  <span class="chip brand"><span class="dot"></span>Active</span>
  <span class="chip income">+ Income</span>
  <span class="chip expense">Over budget</span>
  <span class="chip warning">Idle</span>
  <span class="chip info">New</span>
  <span class="chip">All</span>
</body>
</html>
